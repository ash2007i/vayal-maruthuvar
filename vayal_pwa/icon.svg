<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1a5c1a"/>
  
  <!-- Wheat stalk -->
  <line x1="256" y1="420" x2="256" y2="120" stroke="#a5d6a7" stroke-width="18" stroke-linecap="round"/>
  
  <!-- Wheat grains left -->
  <ellipse cx="215" cy="165" rx="28" ry="16" fill="#81c784" transform="rotate(-35 215 165)"/>
  <ellipse cx="210" cy="215" rx="28" ry="16" fill="#81c784" transform="rotate(-30 210 215)"/>
  <ellipse cx="212" cy="265" rx="26" ry="15" fill="#81c784" transform="rotate(-25 212 265)"/>
  <ellipse cx="218" cy="313" rx="24" ry="14" fill="#81c784" transform="rotate(-20 218 313)"/>
  
  <!-- Wheat grains right -->
  <ellipse cx="297" cy="165" rx="28" ry="16" fill="#66bb6a" transform="rotate(35 297 165)"/>
  <ellipse cx="302" cy="215" rx="28" ry="16" fill="#66bb6a" transform="rotate(30 302 215)"/>
  <ellipse cx="300" cy="265" rx="26" ry="15" fill="#66bb6a" transform="rotate(25 300 265)"/>
  <ellipse cx="294" cy="313" rx="24" ry="14" fill="#66bb6a" transform="rotate(20 294 313)"/>
  
  <!-- Top grain -->
  <ellipse cx="256" cy="130" rx="20" ry="28" fill="#a5d6a7"/>
  
  <!-- Small leaf at bottom -->
  <path d="M256 400 Q220 380 210 350 Q240 360 256 400Z" fill="#4caf50"/>
  <path d="M256 400 Q292 380 302 350 Q272 360 256 400Z" fill="#388e3c"/>
  
  <!-- Tamil letter வ (Va) subtle watermark -->
  <text x="256" y="490" text-anchor="middle" font-family="serif" font-size="42" fill="rgba(255,255,255,0.3)" font-weight="bold">வ.ம</text>
</svg>
